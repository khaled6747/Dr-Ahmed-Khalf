<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr Ahmed Khalf | Personal Space</title>
    <!-- FontAwesome for Premium Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #05060b;
            --glass-bg: rgba(9, 11, 22, 0.45);
            --glass-border: rgba(255, 255, 255, 0.05);
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            
            /* High-End Cyber Neon Colors */
            --neon-medical: #00f2fe;
            --neon-pulse: #ff007f;
            --neon-glow: #7000ff;
            
            /* Brand Colors for Subtle Hover Glows */
            --instagram: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            --facebook: #1877f2;
            --telegram: #229ed9;
            --whatsapp: #25d366;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* --- PRELOADER (CINEMATIC) --- */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #020306;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s cubic-bezier(0.25, 1, 0.5, 1), visibility 0.8s;
        }

        .loader-content {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .loader-pulse {
            position: absolute;
            width: 80px;
            height: 80px;
            border: 2px solid var(--neon-medical);
            border-radius: 50%;
            animation: pulseGlow 1.5s ease-out infinite;
        }

        .loader-icon {
            font-size: 2rem;
            color: #fff;
            text-shadow: 0 0 15px var(--neon-medical);
            animation: heartbeat 1.5s infinite linear;
        }

        @keyframes pulseGlow {
            0% { transform: scale(0.6); opacity: 1; }
            100% { transform: scale(1.4); opacity: 0; border-color: var(--neon-glow); }
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            25% { transform: scale(1.15); }
            40% { transform: scale(1.05); }
            60% { transform: scale(1.15); }
        }

        #loader.fade-out {
            opacity: 0;
            visibility: hidden;
        }

        /* --- BACKGROUND GRADIENT OVERLAY --- */
        .bg-glow-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -2;
            overflow: hidden;
            filter: blur(140px);
            pointer-events: none;
        }

        .glow-blob {
            position: absolute;
            border-radius: 50%;
            opacity: 0.25;
            mix-blend-mode: screen;
            animation: deepFloat 25s infinite alternate ease-in-out;
        }

        .blob-1 { width: 500px; height: 500px; background: var(--neon-medical); top: -10%; left: -10%; }
        .blob-2 { width: 600px; height: 600px; background: var(--neon-glow); bottom: -15%; right: -10%; animation-duration: 35s; }
        .blob-3 { width: 400px; height: 400px; background: var(--neon-pulse); top: 35%; left: 45%; animation-duration: 20s; }

        @keyframes deepFloat {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            50% { transform: translate(60px, -40px) scale(1.1) rotate(180deg); }
            100% { transform: translate(-30px, 60px) scale(0.9) rotate(360deg); }
        }

        /* --- ELEGANT FLOATING MEDICAL ELEMENTS (GLASSMORPHISM) --- */
        .medical-ambient-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
        }

        .floating-med-card {
            position: absolute;
            bottom: -100px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.35);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2), inset 0 0 12px rgba(255, 255, 255, 0.05);
            animation: floatUpward 18s linear infinite;
        }

        /* Distinctive designs per floating element */
        .med-1 { width: 55px; height: 55px; left: 8%; font-size: 1.4rem; animation-duration: 22s; border-color: rgba(0, 242, 254, 0.2); color: rgba(0, 242, 254, 0.4); }
        .med-2 { width: 70px; height: 50px; left: 25%; font-size: 1.5rem; animation-duration: 28s; border-radius: 40px; }
        .med-3 { width: 60px; height: 60px; left: 55%; font-size: 1.3rem; animation-duration: 25s; border-color: rgba(255, 0, 127, 0.15); color: rgba(255, 0, 127, 0.3); }
        .med-4 { width: 50px; height: 50px; left: 78%; font-size: 1.2rem; animation-duration: 19s; }
        .med-5 { width: 65px; height: 65px; left: 88%; font-size: 1.6rem; animation-duration: 32s; border-color: rgba(112, 0, 255, 0.2); }

        @keyframes floatUpward {
            0% { transform: translateY(0) rotate(0deg) scale(0.8); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-115vh) rotate(360deg) scale(1.1); opacity: 0; }
        }

        /* --- MAIN HUB CONTAINER --- */
        .container {
            width: 100%;
            max-width: 460px;
            padding: 55px 24px 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-grow: 1;
            z-index: 10;
        }

        /* Profile Block */
        .profile-card {
            text-align: center;
            margin-bottom: 40px;
            width: 100%;
        }

        .avatar-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 24px;
        }

        .avatar-outer-ring {
            position: absolute;
            inset: -5px;
            background: linear-gradient(135deg, var(--neon-medical), var(--neon-glow), var(--neon-pulse));
            border-radius: 50%;
            z-index: 1;
            animation: rotateRing 8s linear infinite;
        }

        .avatar-inner-plate {
            position: absolute;
            inset: 1px;
            background: #090a10;
            border-radius: 50%;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 2px solid #05060b;
        }

        .avatar-inner-plate i {
            font-size: 2.8rem;
            background: linear-gradient(to bottom, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .avatar-inner-plate img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @keyframes rotateRing {
            100% { transform: rotate(360deg); }
        }

        .name-wrapper {
            height: 40px;
            margin-bottom: 6px;
        }

        .doctor-name {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(180deg, #ffffff 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .pulse-line-cursor {
            color: var(--neon-medical);
            font-weight: 300;
            animation: blink 0.8s infinite;
            margin-left: 3px;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        .medical-faculty {
            font-size: 0.95rem;
            color: var(--text-secondary);
            font-weight: 400;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            opacity: 0.9;
        }

        .medical-faculty i {
            color: var(--neon-medical);
            filter: drop-shadow(0 0 4px rgba(0, 242, 254, 0.4));
        }

        /* --- PREMIUM ULTRA-SLICK BUTTONS --- */
        .links-hub {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .luxury-btn {
            position: relative;
            width: 100%;
            padding: 18px 26px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: #f8fafc;
            font-weight: 500;
            font-size: 1.05rem;
            letter-spacing: 0.3px;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            overflow: hidden;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
        }

        /* Smooth border light trace */
        .luxury-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 20px;
            padding: 1px;
            background: linear-gradient(transparent 60%, rgba(255, 255, 255, 0.12));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            transition: all 0.4s ease;
        }

        .luxury-btn .brand-icon {
            font-size: 1.4rem;
            margin-right: 18px;
            width: 28px;
            text-align: center;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .luxury-btn .action-arrow {
            font-size: 0.8rem;
            opacity: 0.3;
            transform: translateX(0);
            transition: all 0.4s ease;
        }

        .luxury-btn .btn-title {
            flex-grow: 1;
        }

        /* Elegant Customized Hover System */
        .luxury-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: translateY(-4px);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .luxury-btn:hover .action-arrow {
            opacity: 1;
            transform: translateX(5px);
            color: var(--neon-medical);
        }

        /* Instagram Elegance */
        .luxury-btn.instagram:hover {
            box-shadow: 0 12px 30px rgba(220, 39, 67, 0.15);
            border-color: #cc2366;
        }
        .luxury-btn.instagram:hover .brand-icon {
            background: var(--instagram);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transform: scale(1.2) rotate(-8deg);
        }

        /* Facebook Elegance */
        .luxury-btn.facebook:hover {
            box-shadow: 0 12px 30px rgba(24, 119, 242, 0.15);
            border-color: var(--facebook);
        }
        .luxury-btn.facebook:hover .brand-icon {
            color: var(--facebook);
            transform: scale(1.2) rotate(8deg);
        }

        /* Telegram Elegance */
        .luxury-btn.telegram:hover {
            box-shadow: 0 12px 30px rgba(34, 158, 217, 0.15);
            border-color: var(--telegram);
        }
        .luxury-btn.telegram:hover .brand-icon {
            color: var(--telegram);
            transform: scale(1.2) rotate(-8deg);
        }

        /* WhatsApp Elegance */
        .luxury-btn.whatsapp:hover {
            box-shadow: 0 12px 30px rgba(37, 211, 102, 0.15);
            border-color: var(--whatsapp);
        }
        .luxury-btn.whatsapp:hover .brand-icon {
            color: var(--whatsapp);
            transform: scale(1.2) rotate(8deg);
        }

        /* --- PROFESSIONAL FOOTER --- */
        footer {
            width: 100%;
            padding: 35px 24px;
            text-align: center;
            font-size: 0.78rem;
            color: rgba(148, 163, 184, 0.6);
            letter-spacing: 0.8px;
            border-top: 1px solid rgba(255, 255, 255, 0.02);
            background: rgba(5, 6, 11, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            position: relative;
            z-index: 10;
        }

        footer a {
            color: #ffffff;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        footer a:hover {
            color: var(--neon-medical);
        }

        footer .heart-pulse {
            color: var(--neon-pulse);
            display: inline-block;
            animation: heartbeat 1.2s infinite;
        }
    </style>
</head>
<body>

    <!-- Premium Cinematic Loader -->
    <div id="loader">
        <div class="loader-content">
            <div class="loader-pulse"></div>
            <i class="fa-solid fa-heartbeat loader-icon"></i>
        </div>
    </div>

    <!-- Background Ambient Lighting Blur -->
    <div class="bg-glow-container">
        <div class="glow-blob blob-1"></div>
        <div class="glow-blob blob-2"></div>
        <div class="glow-blob blob-3"></div>
    </div>

    <!-- Elegant Floating Medical Glass Elements -->
    <div class="medical-ambient-container">
        <div class="floating-med-card med-1"><i class="fa-solid fa-stethoscope"></i></div>
        <div class="floating-med-card med-2"><i class="fa-solid fa-user-md"></i></div>
        <div class="floating-med-card med-3"><i class="fa-solid fa-heartbeat"></i></div>
        <div class="floating-med-card med-4"><i class="fa-solid fa-microscope"></i></div>
        <div class="floating-med-card med-5"><i class="fa-solid fa-capsules"></i></div>
    </div>

    <!-- Main Core Layout -->
    <div class="container">
        
        <!-- Premium Header Portrait & Details -->
        <header class="profile-card">
            <div class="avatar-container">
                <div class="avatar-outer-ring"></div>
                <div class="avatar-inner-plate">
                    <!-- Replace the <i> icon when you want to put your personal image: -->
                    <img src="image.jpeg" alt="Dr Ahmed Khalf">
                    <!-- <i class="fa-solid fa-user-md"></i> -->
                </div>
            </div>
            
            <div class="name-wrapper">
                <span class="doctor-name" id="doctor-name-typed"></span><span class="pulse-line-cursor">|</span>
            </div>
            
            <p class="medical-faculty">
                <i class="fa-solid fa-graduation-cap"></i>
                Medical Student at Al-Azhar University
            </p>
        </header>

        <!-- Social Gateways Hub -->
        <main class="links-hub">
            
            <!-- Instagram -->
            <a href="https://www.instagram.com/kbara_x3?igsh=MTV6cXR4bWQzcmM2ZA==" target="_blank" rel="noopener noreferrer" class="luxury-btn instagram">
                <i class="fa-brands fa-instagram brand-icon"></i>
                <span class="btn-title">Instagram</span>
                <i class="fa-solid fa-arrow-right-long action-arrow"></i>
            </a>

            <!-- Facebook -->
            <a href="https://www.facebook.com/share/1CxyfiQj4g/" target="_blank" rel="noopener noreferrer" class="luxury-btn facebook">
                <i class="fa-brands fa-facebook-f brand-icon"></i>
                <span class="btn-title">Facebook</span>
                <i class="fa-solid fa-arrow-right-long action-arrow"></i>
            </a>

            <!-- Telegram -->
            <a href="https://t.me/kabara_x3" target="_blank" rel="noopener noreferrer" class="luxury-btn telegram">
                <i class="fa-brands fa-telegram brand-icon"></i>
                <span class="btn-title">Telegram Channel</span>
                <i class="fa-solid fa-arrow-right-long action-arrow"></i>
            </a>

            <!-- WhatsApp -->
            <a href="https://wa.me/201095680642" target="_blank" rel="noopener noreferrer" class="luxury-btn whatsapp">
                <i class="fa-brands fa-whatsapp brand-icon"></i>
                <span class="btn-title">WhatsApp Contact</span>
                <i class="fa-solid fa-arrow-right-long action-arrow"></i>
            </a>

        </main>
    </div>

    <!-- Refined High-End Footer -->
    <footer>
        <p>&copy; 2026 <a href="#">Dr Ahmed Khalf</a>. All Rights Reserved.</p>
        <p style="margin-top: 6px; opacity: 0.5; font-size: 0.72rem;">Crafted with <span class="heart-pulse">&hearts;</span> for Medical Excellence</p>
    </footer>

    <!-- UI Logic Engine -->
    <script>
        // Smooth fade out of preloader
        window.addEventListener('DOMContentLoaded', () => {
            const loader = document.getElementById('loader');
            setTimeout(() => {
                loader.classList.add('fade-out');
                setTimeout(triggerTypingEffect, 500);
            }, 1200); 
        });

        // Elite Typing script
        const nameToType = "Dr Ahmed Khalf";
        let characterIndex = 0;
        const targetOutput = document.getElementById('doctor-name-typed');

        function triggerTypingEffect() {
            if (characterIndex < nameToType.length) {
                targetOutput.textContent += nameToType.charAt(characterIndex);
                characterIndex++;
                setTimeout(triggerTypingEffect, 90);
            }
        }
    </script>
</body>
</html>
